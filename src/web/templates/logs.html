{% extends "base.html" %}

{% block head_extra %}
<style>
    .logs-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 1rem;
    }

    .filter-bar {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
    }

    .filter-bar select {
        padding: 0.55rem 0.8rem;
        min-width: 120px;
    }

    .log-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
    }

    .log-table th {
        text-align: left;
        padding: 0.8rem 0.55rem;
        border-bottom: 1px solid var(--border-strong);
        color: var(--text-secondary);
        font-size: 0.78rem;
    }

    .log-table td {
        padding: 0.85rem 0.55rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
    }

    .log-table tr:hover td {
        background: var(--surface-muted);
    }

    .time-col {
        color: var(--text-secondary);
        white-space: nowrap;
    }

    .value-col {
        text-align: right;
        font-weight: 700;
    }

    .status-col {
        text-align: center;
    }

    .empty-row td {
        text-align: center;
        color: var(--text-secondary);
        padding: 2rem 0.55rem;
    }
</style>
{% endblock %}

{% block content %}
<section class="panel" style="padding: 1.2rem 1.3rem; margin-bottom: 1rem;">
    <div class="logs-header">
        <div>
            <strong>事件日志</strong>
            <p style="margin: 0.45rem 0 0; color: var(--text-secondary); line-height: 1.6;">
                查看最近任务的成功、失败、金额和平台分布。
            </p>
        </div>
        <div class="filter-bar">
            <select id="filter-platform" onchange="loadLogs()">
                <option value="">全部平台</option>
                <option value="jd">京东</option>
                <option value="taobao">淘宝</option>
                <option value="pdd">拼多多</option>
                <option value="miniapp">品牌小程序</option>
            </select>
            <select id="filter-status" onchange="loadLogs()">
                <option value="">全部状态</option>
                <option value="1">成功</option>
                <option value="0">失败</option>
            </select>
        </div>
    </div>
    <div style="color: var(--text-secondary); font-size: 0.84rem;">每 15 秒自动刷新</div>
</section>

<div class="card">
    <table class="log-table">
        <thead>
            <tr>
                <th>时间</th>
                <th>平台</th>
                <th>类型</th>
                <th>标题</th>
                <th style="text-align:right;">金额</th>
                <th style="text-align:center;">状态</th>
            </tr>
        </thead>
        <tbody id="log-table-body">
            <tr class="empty-row"><td colspan="6">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    function loadLogs() {
        var platform = document.getElementById("filter-platform").value;
        var status = document.getElementById("filter-status").value;

        fetch("/api/events?limit=50")
            .then(function(response) { return response.json(); })
            .then(function(data) {
                var tbody = document.getElementById("log-table-body");
                var events = data.events || [];

                if (platform) {
                    events = events.filter(function(event) { return event.platform === platform; });
                }
                if (status !== "") {
                    events = events.filter(function(event) { return event.success === parseInt(status, 10); });
                }

                if (!events.length) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无记录</td></tr>';
                    return;
                }

                tbody.innerHTML = events.map(function(event) {
                    return [
                        "<tr>",
                        '<td class="time-col">' + (event.created_at ? event.created_at.replace("T", " ").substr(0, 19) : "-") + "</td>",
                        '<td><span class="platform-badge ' + event.platform + '">' + event.platform + "</span></td>",
                        '<td style="color: var(--text-secondary);">' + (event.event_type || "-") + "</td>",
                        "<td>" + (event.title || "-") + "</td>",
                        '<td class="value-col">¥' + ((event.value || 0).toFixed(2)) + "</td>",
                        '<td class="status-col">' + (event.success ? "OK" : "!") + "</td>",
                        "</tr>"
                    ].join("");
                }).join("");
            })
            .catch(function() {
                document.getElementById("log-table-body").innerHTML =
                    '<tr class="empty-row"><td colspan="6">加载失败</td></tr>';
            });
    }

    document.addEventListener("DOMContentLoaded", loadLogs);
    setInterval(loadLogs, 15000);
</script>
{% endblock %}
