{% extends "base.html" %}

{% block content %}
<h2 style="margin-bottom: 1rem;">📋 事件日志</h2>

<div class="card">
    <div style="margin-bottom:1rem;">
        <select id="filter-platform" onchange="loadLogs()">
            <option value="">全部平台</option>
            <option value="jd">京东</option>
            <option value="taobao">淘宝</option>
            <option value="pdd">拼多多</option>
        </select>
        <select id="filter-status" onchange="loadLogs()" style="margin-left:0.5rem;">
            <option value="">全部状态</option>
            <option value="1">成功</option>
            <option value="0">失败</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>时间</th>
                <th>平台</th>
                <th>类型</th>
                <th>标题</th>
                <th>价值</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="log-table-body">
            <tr><td colspan="6" style="text-align:center;color:#9ca3af;">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    function loadLogs() {
        const platform = document.getElementById('filter-platform').value;
        const status = document.getElementById('filter-status').value;
        let url = '/api/events?limit=50';

        fetch(url)
            .then(r => r.json())
            .then(d => {
                const tbody = document.getElementById('log-table-body');
                const events = (d.events || []).filter(e => {
                    if (platform && e.platform !== platform) return false;
                    if (status !== '' && e.success !== parseInt(status)) return false;
                    return true;
                });

                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9ca3af;">暂无记录</td></tr>';
                    return;
                }

                tbody.innerHTML = events.map(e => `
                    <tr>
                        <td style="font-size:0.85rem;color:#6b7280;">${e.created_at || '-'}</td>
                        <td>${e.platform}</td>
                        <td>${e.event_type}</td>
                        <td>${e.title || '-'}</td>
                        <td>¥${(e.value || 0).toFixed(2)}</td>
                        <td>${e.success ? '✅' : '❌'}</td>
                    </tr>
                `).join('');
            });
    }

    document.addEventListener('DOMContentLoaded', loadLogs);
    setInterval(loadLogs, 15000);
</script>
{% endblock %}
